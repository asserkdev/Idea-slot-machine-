<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Idea Slot Machine</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <h1>Idea Slot Machine</h1>

    <div class="controls">
      <div class="modes">
        <button id="mode-apps" class="mode active">Apps</button>
        <button id="mode-youtube" class="mode">YouTube</button>
        <button id="mode-games" class="mode">Games</button>
        <button id="mode-tools" class="mode">Tools</button>
        <button id="mode-content" class="mode">Content</button>
      </div>
      <div class="percent-controls">
        <label class="small-input">Sound <input id="useSound" type="checkbox" checked></label>
      </div>
      <div class="toolbar">
        <label class="small-input">Speed:</label>
        <label class="speed"><input type="radio" name="speed" value="normal" checked> Normal (1 w/s)</label>
        <label class="speed"><input type="radio" name="speed" value="fast"> Fast</label>
      </div>
    </div>

    <section class="machine paper-machine">
      <div class="paper-wrap">
        <div id="paper" class="paper">—</div>
        <div id="time" class="estimate small">1 day</div>
      </div>
      <div class="actions">
        <button id="generate">Generate</button>
        <div style="display:flex;flex-direction:column;gap:6px">
          <div style="display:flex;gap:6px">
            <button id="copy">Copy Idea</button>
            <button id="download">Download</button>
            <button id="share">Share</button>
          </div>
        </div>
      </div>
    </section>

    <section class="output">
      <h2>Generated Idea / Prompt</h2>
      <div id="idea" class="idea-output">Press Spin to generate an idea.</div>
    </section>
    <div id="errorLog" class="error-log" hidden></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
